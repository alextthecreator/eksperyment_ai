<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eksperyment AI</title>
  <!-- jsPsych 7: styles from npm -->
  <link href="vendor/jspsych/css/jspsych.css" rel="stylesheet" />
  <link href="local.css" rel="stylesheet" />
  <!-- Plugins import `jspsych` — import map for the browser -->
  <script type="importmap">
  {
    "imports": {
      "jspsych": "./vendor/jspsych/dist/index.js"
    }
  }
  </script>
  <link rel="modulepreload" href="assignment.js" />
  <link rel="modulepreload" href="boot.js" />
  <link rel="modulepreload" href="experiment.js" />
</head>
<body>
  <!-- Visible from first paint — before modules load and condition fetch finishes -->
  <div
    id="experiment-boot"
    class="experiment-boot"
    role="status"
    aria-live="polite"
    style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem;box-sizing:border-box;font-family:system-ui,sans-serif;font-size:1rem;color:#334155;background:#f8fafc"
  >
    <p style="margin:0">Ładowanie badania…</p>
  </div>
  <script type="module" src="boot.js"></script>
  <script type="module" src="experiment.js"></script>
</body>
</html>
